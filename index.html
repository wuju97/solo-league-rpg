<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solo League Rpg</title>
    <style>
        /* --- General Page Setup --- */
        body {
            font-family: 'Courier New', Courier, monospace, sans-serif;
            margin: 0;
            padding: 40px;
            background-color: #ffffff;
            color: #000000;
        }

        /* --- Header Section --- */
        header {
            margin-bottom: 40px;
        }

        .title-container {
            display: inline-block;
            max-width: fit-content;
        }

        .main-title {
            margin: 0;
            font-size: 2.5rem;
            font-weight: normal;
            letter-spacing: 1px;
        }

        /* The double underline effect under the title */
        .double-underline {
            border-bottom: 4px double #000000;
            margin-top: 5px;
            width: 100%;
        }

        /* --- Content Layout --- */
        .content-container {
            position: relative;
            width: 100%;
            margin-top: 20px;
        }

        /* Side Menus Shared Styles */
        .side-menu {
            position: absolute;
            top: 0;
        }

        .side-menu ul {
            list-style-type: none;
            padding: 0;
            margin: 0;
        }

        .side-menu li {
            font-size: 1.3rem;
            margin-bottom: 20px;
            cursor: pointer;
            line-height: 1.4;
            white-space: nowrap;
        }

        /* Left side menu placement */
        .left-menu {
            left: 0;
            text-align: left;
        }

        /* Right side menu placement */
        .right-menu {
            right: 150px; /* Pulls it away from the far right edge so it isn't squished */
            text-align: left; /* Keeps text left-aligned inside its column */
        }

        /* --- Chat Boxes Section --- */
        /* This keeps the chats perfectly centered horizontally on the page */
        .chat-wrapper {
            display: flex;
            justify-content: center; 
            width: 100%;
            margin-top: 0px;
        }

        .chat-container {
            display: flex;
            gap: 60px; /* Generous even space between the two chat boxes */
        }

        /* Boxed chat buttons */
        .chat-box {
            border: 2px solid #000000;
            padding: 5px 15px;
            font-size: 1.2rem;
            cursor: pointer;
            background: none;
            white-space: nowrap;
        }
    </style>
</head>
<body>

    <header>
        <div class="title-container">
            <h1 class="main-title">Solo League Rpg</h1>
            <div class="double-underline"></div>
        </div>
    </header>

    <div class="content-container">
        
        <div class="side-menu left-menu">
            <ul>
                <li>main dashboard.</li>
                <li>league match Entry</li>
                <li>Recent activity</li>
                <li>Character tab</li>
                <li>Battle log</li>
                <li>settings</li>
            </ul>
        </div>

        <div class="chat-wrapper">
            <div class="chat-container">
                <div class="chat-box">PvP chat</div>
                <div class="chat-box">World chat</div>
            </div>
        </div>

        <div class="side-menu right-menu">
            <ul>
                <li>leaderboards</li>
                <li>world map</li>
                <li>Guild</li>
                <li>shop</li>
            </ul>
        </div>

    </div>

</body>
</html>
