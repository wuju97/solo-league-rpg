<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solo League Rpg</title>
    <style>
        /* --- General Page Setup --- */
        body {
            font-family: 'Courier New', Courier, monospace, sans-serif;
            margin: 0;
            padding: 40px;
            background-color: #ffffff;
            color: #000000;
        }

        /* --- Header Section (Title) --- */
        header {
            margin-bottom: 30px;
        }

        .title-container {
            display: inline-block;
            max-width: fit-content;
        }

        .main-title {
            margin: 0;
            font-size: 2.5rem;
            font-weight: normal;
            letter-spacing: 1px;
        }

        /* The double underline effect under the title */
        .double-underline {
            border-bottom: 4px double #000000;
            margin-top: 5px;
            width: 100%;
        }

        /* --- Chat Boxes Section --- */
        /* This wrapper centers the chat boxes horizontally on the page */
        .chat-wrapper {
            display: flex;
            justify-content: center; /* Centers the chats between the left and right sides */
            margin-bottom: 40px;
        }

        .chat-container {
            display: flex;
            gap: 20px;
        }

        /* Boxed chat buttons */
        .chat-box {
            border: 2px solid #000000;
            padding: 5px 15px;
            font-size: 1.2rem;
            cursor: pointer;
            background: none;
        }

        /* --- Main Content Layout (Columns) --- */
        .columns-container {
            display: flex;
            justify-content: space-between;
            max-width: 100%;
        }

        /* Lists formatting */
        ul {
            list-style-type: none;
            padding: 0;
            margin: 0;
        }

        li {
            font-size: 1.3rem;
            margin-bottom: 20px;
            cursor: pointer;
            line-height: 1.4;
        }

        /* Left Column Alignment */
        .left-menu {
            text-align: left;
        }

        /* Right Column Alignment */
        .right-menu {
            text-align: left;
            padding-right: 60px;
        }
    </style>
</head>
<body>

    <header>
        <div class="title-container">
            <h1 class="main-title">Solo League Rpg</h1>
            <div class="double-underline"></div>
        </div>
    </header>

    <div class="chat-wrapper">
        <div class="chat-container">
            <div class="chat-box">PvP chat</div>
            <div class="chat-box">World chat</div>
        </div>
    </div>

    <main class="columns-container">
        
        <div class="left-menu">
            <ul>
                <li>main dashboard.</li>
                <li>league match Entry</li>
                <li>Recent activity</li>
                <li>Character tab</li>
                <li>Battle log</li>
                <li>settings</li>
            </ul>
        </div>

        <div class="right-menu">
            <ul>
                <li>leaderboards</li>
                <li>world map</li>
                <li>Guild</li>
                <li>shop</li>
            </ul>
        </div>

    </main>

</body>
</html>
