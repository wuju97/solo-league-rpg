<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solo League Rpg</title>
    <style>
        /* --- General Page Setup --- */
        body {
            font-family: 'Courier New', Courier, monospace, sans-serif;
            margin: 0;
            padding: 40px;
            background-color: #ffffff;
            color: #000000;
        }

        /* --- Header Section (Title Only) --- */
        header {
            margin-bottom: 60px; /* Gives nice breathing room below the title line */
        }

        .title-container {
            display: inline-block;
            max-width: fit-content;
        }

        .main-title {
            margin: 0;
            font-size: 2.5rem;
            font-weight: normal;
            letter-spacing: 1px;
        }

        /* The double underline effect under the title */
        .double-underline {
            border-bottom: 4px double #000000;
            margin-top: 5px;
            width: 100%;
        }

        /* --- Perfectly Balanced Content Row --- */
        .content-row {
            display: flex;
            justify-content: space-between; /* Ensures equal spacing between the 3 elements */
            align-items: flex-start; /* Lines them up perfectly at the top edge */
            width: 100%;
        }

        /* Each of the three sections gets equal sizing priority */
        .column-left {
            width: 30%;
            text-align: left;
        }

        .column-center {
            width: 40%;
            display: flex;
            justify-content: center; /* Centers the chat boxes container exactly in the middle */
        }

        .column-right {
            width: 30%;
            text-align: left; /* Keeps text left-aligned inside the right column */
            display: flex;
            justify-content: flex-end; /* Aligns the column block to the right side of the screen */
        }

        /* Lists formatting inside side columns */
        ul {
            list-style-type: none;
            padding: 0;
            margin: 0;
        }

        li {
            font-size: 1.3rem;
            margin-bottom: 20px;
            cursor: pointer;
            line-height: 1.4;
            white-space: nowrap;
        }

        /* --- Chat Boxes Formatting --- */
        .chat-container {
            display: flex;
            gap: 50px; /* Clear, wide spacing between the two boxes */
            margin-top: 5px; /* Tiny nudge down so it matches the line height of the first links */
        }

        /* Boxed chat buttons */
        .chat-box {
            border: 2px solid #000000;
            padding: 5px 15px;
            font-size: 1.2rem;
            cursor: pointer;
            background: none;
            white-space: nowrap;
        }
    </style>
</head>
<body>

    <header>
        <div class="title-container">
            <h1 class="main-title">Solo League Rpg</h1>
            <div class="double-underline"></div>
        </div>
    </header>

    <main class="content-row">
        
        <div class="column-left">
            <ul>
                <li>main dashboard.</li>
                <li>league match Entry</li>
                <li>Recent activity</li>
                <li>Character tab</li>
                <li>Battle log</li>
                <li>settings</li>
            </ul>
        </div>

        <div class="column-center">
            <div class="chat-container">
                <div class="chat-box">PvP chat</div>
                <div class="chat-box">World chat</div>
            </div>
        </div>

        <div class="column-right">
            <div>
                <ul>
                    <li>leaderboards</li>
                    <li>world map</li>
                    <li>Guild</li>
                    <li>shop</li>
                </ul>
            </div>
        </div>

    </main>

</body>
</html>
