<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solo League Rpg</title>
    <style>
        /* --- General Page Setup --- */
        body {
            font-family: 'Courier New', Courier, monospace, sans-serif;
            margin: 0;
            padding: 40px;
            background-color: #ffffff;
            color: #000000;
        }

        /* --- Header Section (Stacked Title & Chats) --- */
        header {
            display: flex;
            flex-direction: column; /* Stacks the chats underneath the title */
            gap: 20px; /* Space between the title line and the chat boxes */
            margin-bottom: 50px;
        }

        .title-container {
            display: inline-block;
            max-width: fit-content; /* Keeps the underline perfectly sized to the text */
        }

        .main-title {
            margin: 0;
            font-size: 2.5rem;
            font-weight: normal;
            letter-spacing: 1px;
        }

        /* The double underline effect under the title */
        .double-underline {
            border-bottom: 4px double #000000;
            margin-top: 5px;
            width: 100%;
        }

        .chat-container {
            display: flex;
            gap: 20px;
        }

        /* Boxed chat buttons matching the sketch */
        .chat-box {
            border: 2px solid #000000;
            padding: 5px 15px;
            font-size: 1.2rem;
            cursor: pointer;
            background: none;
        }

        /* --- Main Content Layout (Columns) --- */
        .columns-container {
            display: flex;
            justify-content: space-between;
            max-width: 100%;
            margin-top: 20px;
        }

        /* Lists formatting */
        ul {
            list-style-type: none;
            padding: 0;
            margin: 0;
        }

        li {
            font-size: 1.3rem;
            margin-bottom: 20px;
            cursor: pointer;
            line-height: 1.4;
        }

        /* Left Column Alignment */
        .left-menu {
            text-align: left;
        }

        /* Right Column Alignment */
        .right-menu {
            text-align: left;
            padding-right: 60px;
        }
    </style>
</head>
<body>

    <!-- Top Title and Chat Boxes Stacked -->
    <header>
        <div class="title-container">
            <h1 class="main-title">Solo League Rpg</h1>
            <div class="double-underline"></div>
        </div>
        
        <div class="chat-container">
            <div class="chat-box">PvP chat</div>
            <div class="chat-box">World chat</div>
        </div>
    </header>

    <!-- The Two Navigation Columns -->
    <main class="columns-container">
        
        <!-- Left Side Menu -->
        <div class="left-menu">
            <ul>
                <li>main dashboard.</li>
                <li>league match Entry</li>
                <li>Recent activity</li>
                <li>Character tab</li>
                <li>Battle log</li>
                <li>settings</li>
            </ul>
        </div>

        <!-- Right Side Menu -->
        <div class="right-menu">
            <ul>
                <li>leaderboards</li>
                <li>world map</li>
                <li>Guild</li>
                <li>shop</li>
            </ul>
        </div>

    </main>

</body>
</html>
