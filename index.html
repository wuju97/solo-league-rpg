<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solo League. RPG.</title>
    <style>
        /* --- General Page Setup --- */
        body {
            font-family: 'Courier New', Courier, monospace, sans-serif; /* Giving it a clean, written look */
            margin: 0;
            padding: 40px;
            background-color: #ffffff; /* Clean white background like paper */
            color: #000000; /* Dark text like ink */
        }

        /* --- Header Section (Title + Chats) --- */
        header {
            display: flex;
            align-items: flex-start;
            gap: 40px; /* Puts space between the title and the chat boxes */
            margin-bottom: 50px;
        }

        .title-container {
            display: inline-block;
        }

        .main-title {
            margin: 0;
            font-size: 2.5rem;
            font-weight: normal;
            letter-spacing: 1px;
        }

        /* The double underline effect from your sketch */
        .double-underline {
            border-bottom: 4px double #000000;
            margin-top: 5px;
            width: 100%;
        }

        .chat-container {
            display: flex;
            gap: 20px;
            margin-top: 10px;
        }

        /* Boxed chat buttons matching the pen boxes */
        .chat-box {
            border: 2px solid #000000;
            padding: 5px 15px;
            font-size: 1.2rem;
            cursor: pointer;
            background: none;
        }

        /* --- Main Content Layout (Columns) --- */
        .columns-container {
            display: flex;
            justify-content: space-between; /* Throws one list to the far left, one to the far right */
            max-width: 100%;
            margin-top: 20px;
        }

        /* Lists formatting */
        ul {
            list-style-type: none; /* Removes any bullet points */
            padding: 0;
            margin: 0;
        }

        li {
            font-size: 1.3rem;
            margin-bottom: 20px; /* Space between each item */
            cursor: pointer;
            line-height: 1.4;
        }

        /* Left Column Alignment */
        .left-menu {
            text-align: left;
        }

        /* Right Column Alignment */
        .right-menu {
            text-align: left; /* Text itself aligns left, but the block sits on the right side */
            padding-right: 60px; /* Gives it some breathing room from the very edge of the screen */
        }
    </style>
</head>
<body>

    <!-- Top Title and Chat Boxes -->
    <header>
        <div class="title-container">
            <h1 class="main-title">Solo League. RPG.</h1>
            <div class="double-underline"></div>
        </div>
        
        <div class="chat-container">
            <div class="chat-box">PvP chat</div>
            <div class="chat-box">World chat</div>
        </div>
    </header>

    <!-- The Two Navigation Columns -->
    <main class="columns-container">
        
        <!-- Left Side Menu -->
        <div class="left-menu">
            <ul>
                <li>main dashboard.</li>
                <li>league match Entry</li>
                <li>Recent activity</li>
                <li>Character tab</li>
                <li>Battle log</li>
                <li>settings</li>
            </ul>
        </div>

        <!-- Right Side Menu -->
        <div class="right-menu">
            <ul>
                <li>leaderboards</li>
                <li>world map</li>
                <li>Guild</li>
                <li>shop</li>
            </ul>
        </div>

    </main>

</body>
</html>
