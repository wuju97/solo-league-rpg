<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solo League Rpg</title>
    <style>
        /* --- General Page Setup --- */
        body {
            font-family: 'Courier New', Courier, monospace, sans-serif;
            margin: 0;
            padding: 40px;
            background-color: #ffffff;
            color: #000000;
        }

        /* --- Header Section (Title Only) --- */
        header {
            margin-bottom: 50px;
        }

        .title-container {
            display: inline-block;
            max-width: fit-content;
        }

        .main-title {
            margin: 0;
            font-size: 2.5rem;
            font-weight: normal;
            letter-spacing: 1px;
        }

        /* The double underline effect under the title */
        .double-underline {
            border-bottom: 4px double #000000;
            margin-top: 5px;
            width: 100%;
        }

        /* --- Three-Column Grid Layout --- */
        /* This perfectly splits the layout into 3 equal sections across the screen */
        .main-layout {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr; 
            width: 100%;
            align-items: start;
        }

        /* Lists formatting for side columns */
        ul {
            list-style-type: none;
            padding: 0;
            margin: 0;
        }

        li {
            font-size: 1.3rem;
            margin-bottom: 20px;
            cursor: pointer;
            line-height: 1.4;
        }

        /* Left Column Alignment */
        .left-menu {
            text-align: left;
        }

        /* Center Column Alignment (The Chat Boxes) */
        .center-menu {
            display: flex;
            justify-content: center; /* Centers the container in the middle third */
        }

        .chat-container {
            display: flex;
            gap: 40px; /* Added more spacing between the two chat boxes */
        }

        /* Boxed chat buttons */
        .chat-box {
            border: 2px solid #000000;
            padding: 5px 15px;
            font-size: 1.2rem;
            cursor: pointer;
            background: none;
            white-space: nowrap;
        }

        /* Right Column Alignment */
        .right-menu {
            text-align: right; /* Aligns list neatly to the right edge */
        }
    </style>
</head>
<body>

    <header>
        <div class="title-container">
            <h1 class="main-title">Solo League Rpg</h1>
            <div class="double-underline"></div>
        </div>
    </header>

    <main class="main-layout">
        
        <div class="left-menu">
            <ul>
                <li>main dashboard.</li>
                <li>league match Entry</li>
                <li>Recent activity</li>
                <li>Character tab</li>
                <li>Battle log</li>
                <li>settings</li>
            </ul>
        </div>

        <div class="center-menu">
            <div class="chat-container">
                <div class="chat-box">PvP chat</div>
                <div class="chat-box">World chat</div>
            </div>
        </div>

        <div class="right-menu">
            <ul>
                <li>leaderboards</li>
                <li>world map</li>
                <li>Guild</li>
                <li>shop</li>
            </ul>
        </div>

    </main>

</body>
</html>
